components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:

    AutoescuelaInDto:
      type: object
      required:
        - nombre
        - direccion
        - ciudad
        - telefono
        - email
        - capacidad
        - rating
        - fechaApertura
        - activa
      properties:
        nombre:
          type: string
          example: "Autoescuela Central"
        direccion:
          type: string
          example: "Av. Independencia 15"
        ciudad:
          type: string
          example: "Zaragoza"
        telefono:
          type: string
          example: "976123456"
        email:
          type: string
          format: email
          example: "info@autoescuela.es"
        capacidad:
          type: integer
          minimum: 0
          example: 50
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 10
          example: 8.4
        fechaApertura:
          type: string
          format: date
          example: "2015-09-01"
        activa:
          type: boolean
          example: true

    AutoescuelaOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Autoescuela Central"
        direccion:
          type: string
          example: "Av. Independencia 15"
        ciudad:
          type: string
          example: "Zaragoza"
        telefono:
          type: string
          example: "976123456"
        email:
          type: string
          example: "info@autoescuela.es"
        rating:
          type: number
          format: float
          example: 8.4
        activa:
          type: boolean
          example: true

    AutoescuelaDetailOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Autoescuela Central"
        direccion:
          type: string
          example: "Av. Independencia 15"
        ciudad:
          type: string
          example: "Zaragoza"
        telefono:
          type: string
          example: "976123456"
        email:
          type: string
          example: "info@autoescuela.es"
        rating:
          type: number
          format: float
          example: 8.4
        activa:
          type: boolean
          example: true
        capacidad:
          type: integer
          example: 50
        fechaApertura:
          type: string
          format: date
          example: "2015-09-01"
        latitud:
          type: number
          format: double
          example: 41.6488
        longitud:
          type: number
          format: double
          example: -0.8891
        coches:
          type: array
          items:
            $ref: "#/components/schemas/CocheOutDto"
        profesores:
          type: array
          items:
            $ref: "#/components/schemas/ProfesorOutDto"

    ProfesorInDto:
      type: object
      required:
        - nombre
        - apellidos
        - dni
        - telefono
        - salario
        - fechaContratacion
        - especialidad
        - activo
      properties:
        nombre:
          type: string
          example: "Juan"
        apellidos:
          type: string
          example: "Pérez López"
        dni:
          type: string
          pattern: "[0-9]{8}[A-Z]"
          example: "12345678Z"
        telefono:
          type: string
          pattern: "[0-9]{9}"
          example: "600123456"
        salario:
          type: number
          format: float
          minimum: 0
          example: 2200.50
        fechaContratacion:
          type: string
          format: date
          example: "2022-03-01"
        especialidad:
          type: string
          example: "Prácticas"
        activo:
          type: boolean
          example: true
        autoescuelaId:
          type: array
          items:
            type: integer
            format: int64
          example: [ 1, 3 ]

    ProfesorOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Juan"
        apellidos:
          type: string
          example: "Pérez López"
        dni:
          type: string
          example: "12345678Z"
        telefono:
          type: string
          example: "600123456"
        especialidad:
          type: string
          example: "Prácticas"
        activo:
          type: boolean
          example: true

    ProfesorDetailOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Juan"
        apellidos:
          type: string
          example: "Pérez López"
        dni:
          type: string
          example: "12345678Z"
        telefono:
          type: string
          example: "600123456"
        salario:
          type: number
          format: float
          example: 2200.50
        fechaContratacion:
          type: string
          format: date
          example: "2022-03-01"
        especialidad:
          type: string
          example: "Prácticas"
        activo:
          type: boolean
          example: true
        autoescuelas:
          type: array
          items:
            $ref: "#/components/schemas/AutoescuelaOutDto"

    AlumnoInDto:
      type: object
      required:
        - nombre
        - apellidos
        - dni
        - fechaNacimiento
        - telefono
        - email
        - direccion
        - ciudad
        - usaGafas
      properties:
        nombre:
          type: string
          example: "Carlos"
        apellidos:
          type: string
          example: "García López"
        dni:
          type: string
          pattern: "^[0-9]{8}[A-Z]$"
          example: "12345678Z"
        fechaNacimiento:
          type: string
          format: date
          example: "2000-05-20"
        telefono:
          type: string
          pattern: "^[0-9]{9}$"
          example: "600123456"
        email:
          type: string
          format: email
          example: "carlos@gmail.com"
        direccion:
          type: string
          example: "Calle Mayor 12"
        ciudad:
          type: string
          example: "Zaragoza"
        usaGafas:
          type: boolean
          example: true
        notaTeorico:
          type: number
          format: float
          minimum: 1
          maximum: 10
          example: 7.5
        autoescuelaId:
          type: integer
          format: int64
          example: 1

    AlumnoOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 5
        nombre:
          type: string
          example: "Carlos"
        apellidos:
          type: string
          example: "García López"
        dni:
          type: string
          example: "12345678Z"
        ciudad:
