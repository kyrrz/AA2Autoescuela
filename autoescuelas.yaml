                  summary: Alumno sin autoescuela asignada
                  value:
                    id: 6
                    nombre: "Laura"
                    apellidos: "Martínez Sanz"
                    email: "laura@gmail.com"
                    telefono: "611223344"
                    direccion: "Gran Vía 55"
                    ciudad: "Madrid"
                    dni: "98765432B"
                    fechaNacimiento: "2003-11-10"
