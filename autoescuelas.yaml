          type: string
          example: "Carlos"
        apellidos:
          type: string
          example: "García López"
        email:
          type: string
          format: email
          example: "carlos@gmail.com"
        telefono:
          type: string
          example: "600123456"
        direccion:
          type: string
          example: "Calle Mayor 12"
        ciudad:
          type: string
          example: "Zaragoza"
        dni:
          type: string
          example: "12345678Z"
        fechaNacimiento:
          type: string
          format: date
          example: "2000-05-20"
        usaGafas:
          type: boolean
          example: true
        notaTeorico:
          type: number
          format: float
          example: 7.5
        autoescuela:
          $ref: "#/components/schemas/AutoescuelaOutDto"

    CocheInDto:
      type: object
      required:
        - matricula
        - marca
        - modelo
        - tipoCambio
        - kilometraje
        - fechaCompra
        - precioCompra
        - disponible
      properties:
        matricula:
          type: string
          pattern: "^[0-9]{1,4}(?!.*(LL|CH))[BCDFGHJKLMNPRSTVWXYZ]{3}"
          example: "1234BCD"
        marca:
          type: string
          example: "Seat"
        modelo:
          type: string
          example: "Ibiza"
        tipoCambio:
          type: string
          example: "Manual"
        kilometraje:
          type: integer
          minimum: 1
          example: 45000
        fechaCompra:
          type: string
          format: date
          example: "2023-01-10"
        precioCompra:
          type: number
          format: float
          minimum: 0
          example: 12000.50
        disponible:
          type: boolean
          example: true
        autoescuelaId:
          type: integer
          format: int64
          example: 1

    CocheOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        marca:
          type: string
          example: "Seat"
        modelo:
          type: string
          example: "Ibiza"
        tipoCambio:
          type: string
          example: "Manual"

    CocheDetailOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        marca:
          type: string
          example: "Seat"
        modelo:
          type: string
          example: "Ibiza"
        tipoCambio:
          type: string
          example: "Manual"
        matricula:
          type: string
          example: "1234BCD"
        kilometraje:
          type: integer
          example: 45000
        precioCompra:
          type: number
          format: float
          example: 12000.50
        fechaCompra:
          type: string
          format: date
          example: "2023-01-10"
        disponible:
          type: boolean
          example: true
        autoescuela:
          $ref: "#/components/schemas/AutoescuelaOutDto"

    MatriculaInDto:
      type: object
      required:
        - modalidad
        - tipoMatricula
        - fechaInicio
        - precio
        - horasPracticas
        - horasTeoricas
        - completada
        - autoescuelaId
        - alumnoId
      properties:
        modalidad:
          type: string
          example: "Presencial"
        tipoMatricula:
          type: string
          example: "B"
        fechaInicio:
          type: string
          format: date
          example: "2024-01-10"
        fechaFinal:
          type: string
          format: date
          example: "2024-06-10"
        precio:
          type: number
          format: float
          minimum: 0
          example: 850.0
        horasPracticas:
          type: integer
          minimum: 1
          example: 20
        horasTeoricas:
          type: integer
          minimum: 1
          example: 15
        completada:
          type: boolean
          example: false
        observaciones:
          type: string
          example: "Pendiente de examen práctico"
        autoescuelaId:
          type: integer
          format: int64
          example: 1
        alumnoId:
          type: integer
          format: int64
          example: 3

    MatriculaOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        modalidad:
          type: string
          example: "Presencial"
        tipoMatricula:
          type: string
          example: "B"
        completada:
          type: boolean
          example: false
        autoescuela:
          $ref: "#/components/schemas/AutoescuelaOutDto"
        alumno:
          $ref: "#/components/schemas/AlumnoOutDto"

    MatriculaDetailOutDto:
      type: object
      properties:
