          type: integer
          format: int64
          example: 10
        modalidad:
          type: string
          example: "Presencial"
        tipoMatricula:
          type: string
          example: "B"
        horasPracticas:
          type: integer
          example: 20
        horasTeoricas:
          type: integer
          example: 15
        completada:
          type: boolean
          example: false
        observaciones:
          type: string
          example: "Pendiente de examen práctico"
        alumno:
          $ref: "#/components/schemas/AlumnoOutDto"
        autoescuela:
          $ref: "#/components/schemas/AutoescuelaOutDto"