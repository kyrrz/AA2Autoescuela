      responses:
        "200":
          description: Profesor actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfesorDetailOutDto"
              examples:
                ejemplo1:
                  summary: Cambio de especialidad y salario
                  value:
                    id: 1
                    nombre: "Juan"
                    apellidos: "Pérez López"
                    dni: "12345678Z"
                    telefono: "600111222"
                    salario: 2500.00
                    fechaContratacion: "2022-03-01"
                    especialidad: "Teoría"
                    activo: true
                    autoescuelas: []
                ejemplo2:
                  summary: Actualización completa de datos personales
                  value:
                    id: 2
                    nombre: "María"
                    apellidos: "García Ruiz"
                    dni: "87654321A"
                    telefono: "600555666"
                    salario: 2100.00
                    fechaContratacion: "2023-09-01"
                    especialidad: "Prácticas"
                    activo: true
                    autoescuelas:
                      - id: 1
                        nombre: "Autoescuela Central"
                        ciudad: "Zaragoza"
                        activa: true
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  dni: "Formato de DNI no válido"
                  salario: "El salario debe ser un valor positivo"
        "404":
          description: Profesor no encontrado
          content:
            application/json:
              example:
                message: "Profesor no encontrado"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    patch:
      tags: [ Profesores ]
      summary: Actualización parcial de profesor
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfesorInDto"
      responses:
        "200":
          description: Profesor actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfesorDetailOutDto"
              examples:
                ejemplo1:
                  summary: Desactivar profesor
                  value:
                    id: 1
                    nombre: "Juan"
                    apellidos: "Pérez López"
                    dni: "12345678Z"
                    telefono: "600123456"
                    salario: 2200.50
                    fechaContratacion: "2022-03-01"
                    especialidad: "Prácticas"
                    activo: false
                    autoescuelas: []
                ejemplo2:
                  summary: Actualización de teléfono
                  value:
                    id: 2
                    nombre: "María"
                    apellidos: "García Ruiz"
                    dni: "87654321A"
                    telefono: "699887766"
                    salario: 1950.00
                    fechaContratacion: "2023-09-01"
                    especialidad: "Teoría"
                    activo: true
                    autoescuelas: []
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  telefono: "El teléfono debe tener 9 dígitos"
        "404":
          description: Profesor no encontrado
          content:
            application/json:
              example:
                message: "Profesor no encontrado"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    delete:
      tags: [ Profesores ]
      summary: Eliminar profesor
      parameters:
