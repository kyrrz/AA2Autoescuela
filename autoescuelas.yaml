openapi: "3.1.0"
info:
  title: Autoescuela API
  description: API REST para la gestión de autoescuelas, alumnos, profesores, coches y matrículas
  version: "1.0"
servers:
  - url: https://localhost:8081/api
paths:

  /v1/autoescuelas:
    get:
      tags: [ Autoescuelas ]
      summary: Obtener listado de autoescuelas
      parameters:
        - name: ciudad
          in: query
          required: false
          schema:
            type: string
        - name: ratingG
          in: query
          required: false
          schema:
            type: string
        - name: activa
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Listado de autoescuelas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutoescuelaOutDto"
              example:
                - id: 1
                  nombre: "Autoescuela Central"
                  direccion: "Av. Independencia 15"
                  ciudad: "Zaragoza"
                  telefono: "976123456"
                  email: "info@autoescuela.es"
                  rating: 8.4
                  activa: true
                - id: 2
                  nombre: "Autoescuela Norte"
                  direccion: "Calle Mayor 5"
                  ciudad: "Madrid"
                  telefono: "911234567"
                  email: "norte@autoescuela.es"
                  rating: 7.2
                  activa: false
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    post:
      tags: [ Autoescuelas ]
      summary: Crear autoescuela
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoescuelaInDto"
      responses:
        "201":
          description: Autoescuela creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoescuelaDetailOutDto"
              examples:
                ejemplo1:
                  summary: Autoescuela en Zaragoza
                  value:
                    id: 1
                    nombre: "Autoescuela Central"
                    direccion: "Av. Independencia 15"
                    ciudad: "Zaragoza"
                    telefono: "976123456"
                    email: "info@autoescuela.es"
                    rating: 8.4
                    activa: true
                    capacidad: 50
                    fechaApertura: "2015-09-01"
                    latitud: 41.6488
                    longitud: -0.8891
                    coches: []
                    profesores: []
                ejemplo2:
                  summary: Autoescuela en Madrid
                  value:
                    id: 2
                    nombre: "Autoescuela Norte"
                    direccion: "Calle Mayor 5"
                    ciudad: "Madrid"
                    telefono: "911234567"
                    email: "norte@autoescuela.es"
                    rating: 7.2
                    activa: true
                    capacidad: 30
                    fechaApertura: "2020-03-15"
                    latitud: 40.4168
                    longitud: -3.7038
                    coches: []
                    profesores: []
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  nombre: "El nombre es un campo obligatorio"
                  email: "Formato de email no válido"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

  /v1/autoescuelas/{id}:
    get:
      tags: [ Autoescuelas ]
      summary: Obtener autoescuela por ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Autoescuela encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoescuelaDetailOutDto"
              examples:
                ejemplo1:
                  summary: Autoescuela activa con coches y profesores
                  value:
                    id: 1
                    nombre: "Autoescuela Central"
                    direccion: "Av. Independencia 15"
                    ciudad: "Zaragoza"
                    telefono: "976123456"
                    email: "info@autoescuela.es"
                    rating: 8.4
                    activa: true
                    capacidad: 50
                    fechaApertura: "2015-09-01"
                    latitud: 41.6488
                    longitud: -0.8891
                    coches:
                      - id: 1
                        marca: "Seat"
                        modelo: "Ibiza"
                        tipoCambio: "Manual"
                    profesores:
                      - id: 1
                        nombre: "Juan"
                        apellidos: "Pérez López"
                        dni: "12345678Z"
                        telefono: "600123456"
                        especialidad: "Prácticas"
                        activo: true
                ejemplo2:
                  summary: Autoescuela sin coches ni profesores asignados
                  value:
                    id: 2
                    nombre: "Autoescuela Norte"
                    direccion: "Calle Mayor 5"
                    ciudad: "Madrid"
                    telefono: "911234567"
                    email: "norte@autoescuela.es"
                    rating: 7.2
                    activa: false
                    capacidad: 30
                    fechaApertura: "2020-03-15"
                    latitud: 40.4168
                    longitud: -3.7038
                    coches: []
                    profesores: []
        "404":
          description: Autoescuela no encontrada
          content:
            application/json:
              example:
                message: "Autoescuela no encontrada"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    put:
      tags: [ Autoescuelas ]
      summary: Modificar autoescuela
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoescuelaInDto"
      responses:
        "200":
          description: Autoescuela actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoescuelaDetailOutDto"
              examples:
                ejemplo1:
                  summary: Actualización de dirección y capacidad
                  value:
                    id: 1
                    nombre: "Autoescuela Central Actualizada"
                    direccion: "Av. Independencia 20"
                    ciudad: "Zaragoza"
                    telefono: "976123456"
                    email: "info@autoescuela.es"
                    rating: 9.0
                    activa: true
                    capacidad: 60
                    fechaApertura: "2015-09-01"
                    latitud: 41.6488
                    longitud: -0.8891
                    coches: []
                    profesores: []
                ejemplo2:
                  summary: Actualización desactivando la autoescuela
                  value:
                    id: 2
                    nombre: "Autoescuela Norte"
                    direccion: "Calle Mayor 5"
                    ciudad: "Madrid"
                    telefono: "911234567"
                    email: "norte@autoescuela.es"
                    rating: 7.2
                    activa: false
                    capacidad: 30
                    fechaApertura: "2020-03-15"
                    latitud: 40.4168
                    longitud: -3.7038
                    coches: []
                    profesores: []
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  email: "Formato de email no válido"
                  rating: "El rating debe estar entre 0 y 10"
        "404":
          description: Autoescuela no encontrada
          content:
            application/json:
              example:
                message: "Autoescuela no encontrada"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    patch:
      tags: [ Autoescuelas ]
      summary: Actualización parcial de autoescuela
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoescuelaInDto"
      responses:
        "200":
          description: Autoescuela actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoescuelaDetailOutDto"
              examples:
                ejemplo1:
                  summary: Actualización de teléfono y estado
                  value:
                    id: 1
                    nombre: "Autoescuela Central"
                    direccion: "Av. Independencia 15"
                    ciudad: "Zaragoza"
                    telefono: "976999999"
                    email: "info@autoescuela.es"
                    rating: 8.4
                    activa: false
                    capacidad: 50
                    fechaApertura: "2015-09-01"
                    latitud: 41.6488
                    longitud: -0.8891
                    coches: []
                    profesores: []
                ejemplo2:
                  summary: Actualización de rating
                  value:
                    id: 2
                    nombre: "Autoescuela Norte"
                    direccion: "Calle Mayor 5"
                    ciudad: "Madrid"
                    telefono: "911234567"
                    email: "norte@autoescuela.es"
                    rating: 9.1
                    activa: true
                    capacidad: 30
                    fechaApertura: "2020-03-15"
                    latitud: 40.4168
                    longitud: -3.7038
                    coches: []
                    profesores: []
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  telefono: "El teléfono debe tener 9 dígitos"
        "404":
          description: Autoescuela no encontrada
          content:
            application/json:
              example:
                message: "Autoescuela no encontrada"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    delete:
      tags: [ Autoescuelas ]
      summary: Eliminar autoescuela
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Autoescuela eliminada
        "404":
          description: Autoescuela no encontrada
          content:
            application/json:
              example:
                message: "Autoescuela no encontrada"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

  /v1/profesores:
    get:
      tags: [ Profesores ]
      summary: Obtener listado de profesores
      parameters:
        - name: especialidad
          in: query
          required: false
          schema:
            type: string
        - name: activo
          in: query
          required: false
          schema:
            type: boolean
        - name: nombre
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Listado de profesores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfesorOutDto"
              example:
                - id: 1
                  nombre: "Juan"
                  apellidos: "Pérez López"
                  dni: "12345678Z"
                  telefono: "600123456"
                  especialidad: "Prácticas"
                  activo: true
                - id: 2
                  nombre: "María"
                  apellidos: "García Ruiz"
                  dni: "87654321A"
                  telefono: "600987654"
                  especialidad: "Teoría"
                  activo: true
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    post:
      tags: [ Profesores ]
      summary: Crear profesor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfesorInDto"
      responses:
        "201":
          description: Profesor creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfesorDetailOutDto"
              examples:
                ejemplo1:
                  summary: Profesor de prácticas
                  value:
                    id: 1
                    nombre: "Juan"
                    apellidos: "Pérez López"
                    dni: "12345678Z"
                    telefono: "600123456"
                    salario: 2200.50
                    fechaContratacion: "2022-03-01"
                    especialidad: "Prácticas"
                    activo: true
                    autoescuelas:
                      - id: 1
                        nombre: "Autoescuela Central"
                        direccion: "Av. Independencia 15"
                        ciudad: "Zaragoza"
                        telefono: "976123456"
                        email: "info@autoescuela.es"
                        rating: 8.4
                        activa: true
                ejemplo2:
                  summary: Profesor de teoría sin autoescuela asignada
                  value:
                    id: 2
                    nombre: "María"
                    apellidos: "García Ruiz"
                    dni: "87654321A"
                    telefono: "600987654"
                    salario: 1950.00
                    fechaContratacion: "2023-09-01"
                    especialidad: "Teoría"
                    activo: true
                    autoescuelas: []
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  dni: "Formato de DNI no válido"
                  telefono: "El teléfono debe tener 9 dígitos"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

  /v1/profesores/{id}:
    get:
      tags: [ Profesores ]
      summary: Obtener profesor por ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Profesor encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfesorDetailOutDto"
              examples:
                ejemplo1:
                  summary: Profesor con autoescuelas asignadas
                  value:
                    id: 1
                    nombre: "Juan"
                    apellidos: "Pérez López"
                    dni: "12345678Z"
                    telefono: "600123456"
                    salario: 2200.50
                    fechaContratacion: "2022-03-01"
                    especialidad: "Prácticas"
                    activo: true
                    autoescuelas:
                      - id: 1
                        nombre: "Autoescuela Central"
                        ciudad: "Zaragoza"
                        activa: true
                ejemplo2:
                  summary: Profesor inactivo sin autoescuelas
                  value:
                    id: 3
                    nombre: "Pedro"
                    apellidos: "Sánchez Mora"
                    dni: "11223344B"
                    telefono: "611223344"
                    salario: 1800.00
                    fechaContratacion: "2019-06-15"
                    especialidad: "Teoría"
                    activo: false
                    autoescuelas: []
        "404":
          description: Profesor no encontrado
          content:
            application/json:
              example:
                message: "Profesor no encontrado"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    put:
      tags: [ Profesores ]
      summary: Modificar profesor
      parameters:
