      responses:
        "204":
          description: Profesor eliminado
        "404":
          description: Profesor no encontrado
          content:
            application/json:
              example:
                message: "Profesor no encontrado"
                code: 404
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

  /v1/alumnos:
    get:
      tags: [ Alumnos ]
      summary: Obtener listado de alumnos
      parameters:
        - name: nombre
          in: query
          required: false
          schema:
            type: string
        - name: ciudad
          in: query
          required: false
          schema:
            type: string
        - name: usaGafas
          in: query
          required: false
          schema:
            type: boolean
        - name: notaTeorico
          in: query
          required: false
          schema:
            type: number
            format: float
      responses:
        "200":
          description: Listado de alumnos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlumnoOutDto"
              example:
                - id: 5
                  nombre: "Carlos"
                  apellidos: "García López"
                  dni: "12345678Z"
                  ciudad: "Zaragoza"
                  notaTeorico: 7.5
                - id: 6
                  nombre: "Laura"
                  apellidos: "Martínez Sanz"
                  dni: "98765432B"
                  ciudad: "Madrid"
                  notaTeorico: 9.0
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

    post:
      tags: [ Alumnos ]
      summary: Crear alumno
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlumnoInDto"
      responses:
        "201":
          description: Alumno creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlumnoDetailOutDto"
              examples:
                ejemplo1:
                  summary: Alumno con nota teórico asignado a autoescuela
                  value:
                    id: 5
                    nombre: "Carlos"
                    apellidos: "García López"
                    email: "carlos@gmail.com"
                    telefono: "600123456"
                    direccion: "Calle Mayor 12"
                    ciudad: "Zaragoza"
                    dni: "12345678Z"
                    fechaNacimiento: "2000-05-20"
                    usaGafas: true
                    notaTeorico: 7.5
                    autoescuela:
                      id: 1
                      nombre: "Autoescuela Central"
                      ciudad: "Zaragoza"
                      activa: true
                ejemplo2:
                  summary: Alumno sin nota teórico ni autoescuela
                  value:
                    id: 6
                    nombre: "Laura"
                    apellidos: "Martínez Sanz"
                    email: "laura@gmail.com"
                    telefono: "611223344"
                    direccion: "Gran Vía 55"
                    ciudad: "Madrid"
                    dni: "98765432B"
                    fechaNacimiento: "2003-11-10"
                    usaGafas: false
                    notaTeorico: null
                    autoescuela: null
        "400":
          description: Datos inválidos
          content:
            application/json:
              example:
                message: "Datos inválidos"
                errors:
                  dni: "Formato de DNI no válido"
                  email: "Formato de email no válido"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              example:
                message: "Error interno del servidor"
                code: 500

  /v1/alumnos/{id}:
    get:
      tags: [ Alumnos ]
      summary: Obtener alumno por ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Alumno encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlumnoDetailOutDto"
              examples:
                ejemplo1:
                  summary: Alumno con autoescuela asignada
                  value:
                    id: 5
                    nombre: "Carlos"
                    apellidos: "García López"
                    email: "carlos@gmail.com"
