name: Integration tests with Newman

on:
  pull_request:
    branches:
      - main

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: mvn package
      - run: docker build -t autoescuela-api .
      - name: Create .env file
        run: |
          echo "MARIADB_ROOT_PASSWORD=${{ secrets.MARIADB_ROOT_PASSWORD }}" >> .env
          echo "MARIADB_USER=${{ secrets.MARIADB_USER }}" >> .env
          echo "AUTOESCUELA_DATABASE_PASSWORD=${{ secrets.AUTOESCUELA_DATABASE_PASSWORD }}" >> .env
          echo "MARIADB_DATABASE=${{ secrets.MARIADB_DATABASE }}" >> .env
          echo "PROFILE=prod" >> .env
          echo "DB_HOST=autoescuela-db" >> .env
      - run: docker compose build
      - run: docker compose up -d
      - name: Wait for services
        run: sleep 30
      - run: npm install -g newman
      - run: newman run -e autoescuela.postman_collection.json -e local.postman_environment.json